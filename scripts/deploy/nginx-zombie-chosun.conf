server {
    listen 80;
    listen [::]:80;
    server_name zombie-chosun.hyeon.space;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name zombie-chosun.hyeon.space;

    ssl_certificate /etc/letsencrypt/live/zombie-chosun.hyeon.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zombie-chosun.hyeon.space/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/zombie-chosun/current;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
